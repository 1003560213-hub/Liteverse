name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify public source
        run: npm run verify:public

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package macOS app
        run: npm run desktop:package
